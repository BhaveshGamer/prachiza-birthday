<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Prachiza</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffb6d9,#d9c6ff);
overflow:hidden;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:320px;
margin:auto;
margin-top:120px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

button{
background:#ff4d88;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

#intro{
position:absolute;
top:40%;
width:100%;
font-size:42px;
font-weight:bold;
color:white;
text-shadow:0 0 20px pink,0 0 40px pink;
animation:fade 3s forwards;
}

@keyframes fade{
0%{opacity:0}
20%{opacity:1}
80%{opacity:1}
100%{opacity:0}
}

.heart{
position:absolute;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

</style>
</head>

<body>

<div id="intro">
Prachiza ✨  
Someone made this for you
</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div class="card">

<h1>Happy Birthday 🎂</h1>
<h2>Prachiza Verma</h2>

<p>
Out of everyone in the world,
I'm really glad I met you.
</p>

<button onclick="reveal()">Start Surprise</button>

<p id="msg"></p>

</div>

<script>

for(let i=0;i<30;i++){
let h=document.createElement("div")
h.innerHTML="💖"
h.className="heart"
h.style.left=Math.random()*100+"%"
h.style.fontSize=(20+Math.random()*30)+"px"
document.body.appendChild(h)
}

function reveal(){
document.getElementById("msg").innerHTML=
"I really like you Prachiza ❤️";
}

</script>

</body>
</html>
